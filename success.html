<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success - Manchester United Official Online Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
        <div class="container navbar">
            <a href="index.html" class="nav-brand">
                <img src="https://upload.wikimedia.org/wikipedia/en/7/7a/Manchester_United_FC_crest.svg" alt="Man Utd Logo">
            </a>
        </div>
    </header>

    <main class="container auth-layout">
        <div class="auth-box" style="text-align: center;">
            <i class="fa-regular fa-circle-check" style="font-size: 5rem; color: #28a745; margin-bottom: 20px;"></i>
            <h2 class="auth-title">Thank You!</h2>
            <p class="auth-desc">Your order has been placed successfully.</p>
            <p style="margin-bottom: 30px;">Order Number: <strong>#MU-${Math.floor(Math.random() * 1000000)}</strong></p>
            <a href="index.html" class="btn btn-primary">Continue Shopping</a>
        </div>
    </main>
</body>
</html>
